{% extends 'base.html' %}

{% block content %}

<h1>

    Admin Results

</h1>

{% for fixture in fixtures %}

<div class="fixture-card">

    <p>

        {{ fixture.home_team }}

        vs

        {{ fixture.away_team }}

    </p>

    <p>

        Current kickoff:
        {{ fixture.kickoff }}

    </p>

    <form
        action="/update-result"
        method="POST"
    >

        <input
            type="hidden"
            name="fixture_id"
            value="{{ fixture.id }}"
        >

        <input
            type="number"
            name="home_score"
            min="0"
            max="19"
            placeholder="Home"
        >

        <input
            type="number"
            name="away_score"
            min="0"
            max="19"
            placeholder="Away"
        >

        <br><br>

        <input
            type="datetime-local"
            name="kickoff"
        >

        <br><br>

        <button type="submit">

            Save

        </button>

    </form>

</div>

{% endfor %}

{% endblock %}
