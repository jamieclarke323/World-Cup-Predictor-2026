{% extends 'base.html' %}

{% block content %}

<h1>

    Admin Results

</h1>

{% for fixture in fixtures %}

<div class="fixture-card">

    <p>

        {{ fixture.home_team }}

        vs

        {{ fixture.away_team }}

    </p>

    <form
        action="/update-result"
        method="POST"
    >

        <input
            type="hidden"
            name="fixture_id"
            value="{{ fixture.id }}"
        >

        <input
            type="number"
            name="home_score"
            min="0"
            max="9"
        >

        <input
            type="number"
            name="away_score"
            min="0"
            max="9"
        >

        <button type="submit">

            Save Result

        </button>

    </form>

</div>

{% endfor %}

{% endblock %}
