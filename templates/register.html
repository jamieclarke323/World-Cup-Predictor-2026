<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-form">

    <h1>Create Account</h1>

    <form method="POST">

        <input type="text"
               name="first_name"
               placeholder="First Name"
               required>

        <input type="text"
               name="last_name"
               placeholder="Last Name"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

</div>

</body>

</html>
